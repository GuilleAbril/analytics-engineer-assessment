version: 2

models:
  - name: stg_raw__events
    description: "Staged events data cleaned and typed from raw source"
    columns:
      - name: event_id
        description: "Unique event identifier"
        data_tests:
          - not_null
          - unique
      - name: campaign_id
        description: "Foreign key to campaigns"
        data_tests:
          - not_null
      - name: client_id
        description: "Client identifier"
        data_tests:
          - not_null
      - name: event_date
        description: "Date of the event"
        data_tests:
          - not_null
      - name: event_type
        description: "Type of marketing event"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['impression', 'click', 'form_fill', 'meeting_booked']
      - name: account_id
        description: "Account identifier"
      - name: revenue_influenced
        description: "Revenue influenced by the event in decimal"
        data_tests:
          - is_positive

  - name: stg_raw__campaigns
    description: "Staged campaigns data cleaned and typed from raw source"
    columns:
      - name: campaign_id
        description: "Unique campaign identifier"
        data_tests:
          - not_null
          - unique
      - name: client_id
        description: "Client identifier"
        data_tests:
          - not_null
      - name: channel
        description: "Marketing channel"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['linkedin', 'google', 'email', 'display', 'content']
      - name: campaign_name
        description: "Name of the campaign"
      - name: start_date
        description: "Campaign start date"
      - name: end_date
        description: "Campaign end date"
      - name: budget
        description: "Campaign budget in decimal"
        data_tests:
          - is_positive
  
  - name: stg_raw__accounts
    description: "Staged accounts data cleaned and typed from raw source"
    columns:
      - name: account_id
        description: "Unique account identifier that is targeted to the client"
        data_tests:
          - not_null
          - unique
      - name: account_name
        description: "Account name"
        data_tests:
          - not_null
      - name: industry
        description: "Industry or sector of the account"
      - name: employee_count
        description: "Name of the employees in the account"
        data_tests:
          - is_positive
      - name: client_id
        description: "Client identifier for the target account"
        data_tests:
          - not_null
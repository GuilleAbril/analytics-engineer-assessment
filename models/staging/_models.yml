version: 2

models:
  - name: stg_campaigns
    description: "Clean staging model for marketing campaigns. Reference model — provided as an example."
    columns:
      - name: campaign_id
        description: "Unique campaign identifier"
        tests:
          - unique
          - not_null
      - name: channel
        description: "Marketing channel (linkedin, google, email, display, content)"
      - name: budget
        description: "Campaign budget in USD"
      - name: campaign_duration_days
        description: "Number of days between start_date and end_date"

  - name: stg_raw__events
    description: "Staged events data cleaned and typed from raw source"
    columns:
      - name: event_id
        description: "Unique event identifier"
        data_tests:
          - not_null
          - unique
      - name: campaign_id
        description: "Foreign key to campaigns"
        data_tests:
          - not_null
      - name: client_id
        description: "Client identifier"
        data_tests:
          - not_null
      - name: date
        description: "Date of the event"
        data_tests:
          - not_null
      - name: event_type
        description: "Type of marketing event"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['impression', 'click', 'form_fill', 'meeting_booked']
      - name: account_id
        description: "Account identifier"
      - name: revenue_influenced
        description: "Revenue influenced by the event in decimal"

  - name: stg_raw__campaigns
    description: "Staged campaigns data cleaned and typed from raw source"
    columns:
      - name: campaign_id
        description: "Unique campaign identifier"
        data_tests:
          - not_null
          - unique
      - name: client_id
        description: "Client identifier"
        data_tests:
          - not_null
      - name: channel
        description: "Marketing channel"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['linkedin', 'google', 'email', 'display', 'content']
      - name: campaign_name
        description: "Name of the campaign"
      - name: start_date
        description: "Campaign start date"
      - name: end_date
        description: "Campaign end date"
      - name: budget
        description: "Campaign budget in decimal"
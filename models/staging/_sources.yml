version: 2

sources:
  - name: raw
    description: "Raw seed data simulating source system ingestion"
    schema: main
    tables:
      - name: raw_campaigns
        description: "Marketing campaigns across clients and channels"
        columns:
          - name: campaign_id
            description: "Unique campaign identifier"
          - name: client_id
          - name: channel
            data_tests:
              - accepted_values:
                  arguments:
                    values: ['linkedin', 'google', 'email', 'display', 'content']

      - name: raw_events
        description: "Marketing engagement events"
        columns:
          - name: event_id
            description: "Unique event identifier"
          - name: campaign_id
          - name: event_type
            data_tests:
              - accepted_values:
                  arguments:
                    values: ['impression', 'click', 'form_fill', 'meeting_booked']

      - name: raw_accounts
        description: "B2B accounts (companies) that engage with campaigns"
        columns:
          - name: account_id
            description: "Unique account identifier"
          - name: account_name
          - name: industry
          - name: employee_count
          - name: client_id

  - name: external
    description: "External files (Parquet) read directly by DuckDB"
    meta:
      external_location: "{{ env_var('DBT_PROJECT_DIR', '.') }}/data/{name}.parquet"
    tables:
      - name: ad_spend
        description: external data source with ad spend information
        columns:
          - name: campaign_id
          - name: client_id
          - name: spend_date
          - name: actual_spend
